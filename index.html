<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Banana Blitz DX</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23070b1f'/%3E%3Cpath d='M15 39c15 14 36 6 39-16-5 9-18 17-35 9-4 1-6 4-4 7z' fill='%23ffcf46'/%3E%3Cpath d='M17 35c11 8 26 5 34-9' fill='none' stroke='%23fff8d8' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='17' cy='38' r='4' fill='%236b3a21'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css?v=20260607d" />
  </head>
  <body>
    <main class="cabinet">
      <section class="stage" aria-label="Banana Blitz DX game">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="scanlines" aria-hidden="true"></div>
        <div class="mobile-hud" aria-hidden="true">
          <div class="hud-chip hud-p1"><span>P1</span><strong id="hudP1Score">0</strong></div>
          <div class="hud-chip hud-wind"><span>Wind</span><strong id="hudWind">0</strong></div>
          <div class="hud-chip hud-p2"><span id="hudP2Name">CPU</span><strong id="hudP2Score">0</strong></div>
          <div class="hud-shot" aria-hidden="true">
            <div class="shot-readout">
              <div class="shot-stat">
                <span>Angle</span>
                <strong><span id="hudAngle">45</span>°</strong>
              </div>
              <div class="shot-divider" aria-hidden="true">↗</div>
              <div class="shot-stat">
                <span>Power</span>
                <strong><span id="hudVelocity">70</span></strong>
              </div>
            </div>
            <div class="power-meter" aria-hidden="true">
              <div id="hudPowerFill" class="power-fill"></div>
            </div>
            <div id="hudHint" class="shot-hint">Drag anywhere to aim</div>
          </div>
        </div>
        <button id="menuButton" class="menu-button" type="button" aria-haspopup="true" aria-expanded="false">Menu</button>
      </section>

      <aside class="panel" aria-label="Game controls">
        <div class="scoreboard">
          <div>
            <span id="p1Name">P1</span>
            <strong id="p1Score">0</strong>
          </div>
          <div>
            <span id="roundLabel">Round 1</span>
            <strong id="windReadout">Wind 0</strong>
          </div>
          <div>
            <span id="p2Name">P2</span>
            <strong id="p2Score">0</strong>
          </div>
        </div>

        <form id="shotForm" class="controls">
          <label>
            <span>Angle</span>
            <input id="angle" type="range" min="1" max="89" value="45" />
            <output id="angleOut" for="angle">45</output>
          </label>

          <label>
            <span>Velocity</span>
            <input id="velocity" type="range" min="20" max="130" value="70" />
            <output id="velocityOut" for="velocity">70</output>
          </label>

          <button id="modeToggle" type="button" aria-pressed="true">Mode: 1P</button>
          <button id="difficultyToggle" type="button">Difficulty: Normal</button>
          <button id="aimToggle" type="button" aria-pressed="false">Aim Preview Off</button>
          <button id="soundToggle" type="button" aria-pressed="true">Sound On</button>
          <button id="throwButton" type="submit">Throw Banana</button>
          <button id="newRoundButton" type="button">New Skyline</button>
        </form>

        <p id="status" class="status">Player 1, set angle and velocity.</p>
      </aside>
    </main>
    <div id="pauseOverlay" class="pause-overlay" aria-hidden="true">
      <div class="pause-menu" role="dialog" aria-modal="true" aria-label="Game menu">
        <button id="resumeButton" type="button">Resume</button>
        <button id="menuAimToggle" type="button" aria-pressed="false">Aim Preview Off</button>
        <button id="menuSoundToggle" type="button" aria-pressed="true">Sound On</button>
        <button id="menuDifficultyToggle" type="button">Difficulty: Normal</button>
        <button id="menuNewRoundButton" type="button">New Skyline</button>
        <button id="menuModeToggle" type="button" aria-pressed="true">Mode: 1P</button>
      </div>
    </div>
    <div id="touchTutorial" class="touch-tutorial" aria-hidden="true">
      <div class="tutorial-card" role="dialog" aria-label="Touch aiming">
        <p>Drag anywhere to aim</p>
        <p>Up/down changes angle</p>
        <p>Toward enemy changes power</p>
        <p>Release to throw</p>
        <button id="tutorialGotIt" type="button">Got it</button>
      </div>
    </div>
    <div class="rotate-warning" role="img" aria-label="Turn sideways to play. Landscape mode gives you room to aim."></div>

    <script src="script.js?v=20260607d"></script>
  </body>
</html>
