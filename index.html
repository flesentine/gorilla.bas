<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Banana Blitz DX</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="cabinet">
      <section class="stage" aria-label="Banana Blitz DX game">
        <canvas id="game" width="960" height="540"></canvas>
        <div class="scanlines" aria-hidden="true"></div>
      </section>

      <aside class="panel" aria-label="Game controls">
        <div class="scoreboard">
          <div>
            <span id="p1Name">P1</span>
            <strong id="p1Score">0</strong>
          </div>
          <div>
            <span id="roundLabel">Round 1</span>
            <strong id="windReadout">Wind 0</strong>
          </div>
          <div>
            <span id="p2Name">P2</span>
            <strong id="p2Score">0</strong>
          </div>
        </div>

        <form id="shotForm" class="controls">
          <label>
            <span>Angle</span>
            <input id="angle" type="range" min="1" max="89" value="45" />
            <output id="angleOut" for="angle">45</output>
          </label>

          <label>
            <span>Velocity</span>
            <input id="velocity" type="range" min="20" max="130" value="70" />
            <output id="velocityOut" for="velocity">70</output>
          </label>

          <button id="aimToggle" type="button" aria-pressed="false">Aim Dots Off</button>
          <button id="throwButton" type="submit">Throw Banana</button>
          <button id="newRoundButton" type="button">New Skyline</button>
        </form>

        <p id="status" class="status">Player 1, set angle and velocity.</p>
      </aside>
    </main>

    <script src="script.js"></script>
  </body>
</html>
